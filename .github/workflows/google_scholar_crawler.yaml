name: Get Citation Data

on:
  workflow_dispatch:      # lets you run it manually from the Actions tab ("Run workflow")
  push:
    branches: [main]      # runs whenever you push to main
  page_build:             # runs after a GitHub Pages build (needs Pages enabled)
  schedule:
    - cron: '0 8 * * *'   # and daily at 08:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Google Scholar often blocks CI IPs; fail fast instead of hanging for hours
    steps:
    - uses: actions/checkout@v2
    - name: Install Reqs
      run: |
        sudo apt-get install python3-setuptools
    - name: Run
      run: |
        cd ./google_scholar_crawler
        pip3 install -r requirements.txt
        python3 main.py
        cd ./results
        git init
        git config --local user.name "${GITHUB_ACTOR}"
        export remote_repo="https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
        git add *.json
        git commit -m "Updated Citation Data"
        git push "${remote_repo}" HEAD:google-scholar-stats --force
      env: 
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}