<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>

<!-- SEO enhancements (fill gaps not covered by seo.html) -->
<meta name="description" content="{{ site.description }}">
<meta name="author" content="{{ site.author.name }}">
<meta name="keywords" content="Shubhro Dev, AI, machine learning, deep learning, large language models, LLM, NLP, computer vision, federated learning, differential privacy, time-series, RGIPT, Siemens">

<meta property="og:type" content="website">
<meta property="og:image" content="{{ site.author.avatar | prepend: '/' | prepend: site.url }}">
